name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build
        run: node node_modules/vite/bin/vite.js build

      - name: Verify secrets
        run: |
          test -n "${{ secrets.VPS_HOST }}" || (echo "VPS_HOST is empty" && exit 1)
          test -n "${{ secrets.VPS_PORT }}" || (echo "VPS_PORT is empty" && exit 1)
          test -n "${{ secrets.VPS_USER }}" || (echo "VPS_USER is empty" && exit 1)
          test -n "${{ secrets.VPS_SSH_KEY }}" || (echo "VPS_SSH_KEY is empty" && exit 1)
          echo "Secrets OK"

      - name: Setup SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Add server to known_hosts
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          ssh-keyscan -p "${{ secrets.VPS_PORT }}" -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Test SSH connection
        run: |
          ssh -p "${{ secrets.VPS_PORT }}" \
          ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
          "echo Connected"

      - name: Create target directory
        run: |
          ssh -p "${{ secrets.VPS_PORT }}" \
          ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
          "mkdir -p /var/www/fortisunion"

      - name: Deploy files
        run: |
          rsync -avz --delete \
          -e "ssh -p ${{ secrets.VPS_PORT }}" \
          dist/ \
          ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/var/www/fortisunion/

      - name: Reload nginx
        run: |
          ssh -p "${{ secrets.VPS_PORT }}" \
          ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
          "sudo systemctl reload nginx"